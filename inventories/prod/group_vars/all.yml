---
openclaw_install_mode: release
openclaw_enterprise_enabled: true
openclaw_enterprise_profiles:
  - name: prod-main
    gateway_port: 18789
    gateway_bind: loopback
    browser:
      enabled: true
      defaultProfile: openclaw
    state_dir: /home/openclaw/.openclaw-prod-main
    config_path: /home/openclaw/.openclaw-prod-main/openclaw.json
    workspace_root: /home/openclaw/.openclaw-prod-main/workspace
    model_primary: anthropic/claude-opus-4-6
    model_fallbacks:
      - openai/gpt-5.2
      - anthropic/claude-sonnet-4-5
      - openai/gpt-5-mini
    tools_profile: coding
    sandbox_mode: non-main
    sandbox_scope: session
    max_concurrent: 8
    context_tokens: 250000
    agents:
      - id: main
        default: true
        workspace: /home/openclaw/.openclaw-prod-main/workspace
      - id: ops
        workspace: /home/openclaw/.openclaw-prod-main/workspace-ops
        tools:
          profile: messaging
      - id: research
        workspace: /home/openclaw/.openclaw-prod-main/workspace-research
        tools:
          profile: coding
      - id: browser-login
        workspace: /home/openclaw/.openclaw-prod-main/workspace-browser-login
        sandbox:
          mode: "off"
        tools:
          profile: full
          allow:
            - browser
    bindings: []
    env:
      OPENCLAW_GATEWAY_TOKEN: "{{ vault_openclaw_gateway_token_prod_main | default('') }}"
      OPENAI_API_KEY: "{{ vault_openai_api_key_prod | default('') }}"
      ANTHROPIC_API_KEY: "{{ vault_anthropic_api_key_prod | default('') }}"

  - name: prod-rescue
    gateway_port: 19789
    gateway_bind: loopback
    browser:
      enabled: true
      defaultProfile: openclaw
    state_dir: /home/openclaw/.openclaw-prod-rescue
    config_path: /home/openclaw/.openclaw-prod-rescue/openclaw.json
    workspace_root: /home/openclaw/.openclaw-prod-rescue/workspace
    model_primary: openai/gpt-5-mini
    model_fallbacks:
      - anthropic/claude-sonnet-4-5
      - openai/gpt-5.2
    tools_profile: messaging
    sandbox_mode: all
    sandbox_scope: agent
    agents:
      - id: main
        default: true
        workspace: /home/openclaw/.openclaw-prod-rescue/workspace
      - id: browser-login
        workspace: /home/openclaw/.openclaw-prod-rescue/workspace-browser-login
        sandbox:
          mode: "off"
        tools:
          profile: full
          allow:
            - browser
    bindings: []
    env:
      OPENCLAW_GATEWAY_TOKEN: "{{ vault_openclaw_gateway_token_prod_rescue | default('') }}"
      OPENAI_API_KEY: "{{ vault_openai_api_key_prod | default('') }}"
      ANTHROPIC_API_KEY: "{{ vault_anthropic_api_key_prod | default('') }}"
