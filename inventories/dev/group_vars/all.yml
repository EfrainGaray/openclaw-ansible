---
openclaw_install_mode: release
openclaw_enterprise_enabled: true
openclaw_rollout_serial: 1
openclaw_ignore_unreachable: true
openclaw_max_fail_percentage: 100
openclaw_enterprise_profiles:
  - name: dev-main
    gateway_port: 19011
    gateway_bind: loopback
    browser:
      enabled: true
      defaultProfile: openclaw
    state_dir: /home/openclaw/.openclaw-dev-main
    config_path: /home/openclaw/.openclaw-dev-main/openclaw.json
    workspace_root: /home/openclaw/.openclaw-dev-main/workspace
    model_primary: openai/gpt-5-mini
    model_fallbacks:
      - anthropic/claude-sonnet-4-5
      - openai/gpt-5.2
    tools_profile: coding
    sandbox_mode: non-main
    sandbox_scope: session
    user_profile:
      name: Efrain Garay
      call: Efra
      timezone: America/Santiago
      notes:
        - Prefer direct answers with practical execution details.
        - Keep communication clear, human, and low on filler text.
    agents:
      - id: main
        default: true
        name: Menicius Core
        identity:
          name: Menicius
          theme: operations orchestrator
          emoji: ":compass:"
        workspace: /home/openclaw/.openclaw-dev-main/workspace
      - id: research
        name: Russell Research
        identity:
          name: Russell
          theme: evidence analyst
          emoji: ":microscope:"
        workspace: /home/openclaw/.openclaw-dev-main/workspace-research
        tools:
          profile: coding
      - id: browser-login
        name: Andtera Browser
        identity:
          name: Andtera
          theme: browser login specialist
          emoji: ":key:"
        workspace: /home/openclaw/.openclaw-dev-main/workspace-browser-login
        sandbox:
          mode: "off"
        tools:
          profile: full
          allow:
            - browser
      - id: coolify-ops
        name: Forge Ops
        identity:
          name: Forge
          theme: deployment reliability engineer
          emoji: ":gear:"
        workspace: /home/openclaw/.openclaw-dev-main/workspace-coolify-ops
        tools:
          profile: coding
    agent_personas:
      - id: main
        display_name: Menicius Core
        identity_name: Menicius
        creature: Systems navigator
        role: Primary operator and execution lead
        vibe: Direct, clear, and pragmatic
        tone: Calm and action oriented
        mission: Convert requests into executable outcomes and close loops with evidence.
        responsibilities:
          - Triage requests and define an execution path.
          - Coordinate specialized agents when needed.
          - Return clean human summaries with concrete next steps.
      - id: research
        display_name: Russell Research
        identity_name: Russell
        creature: Research analyst
        role: Deep analysis and verification specialist
        vibe: Methodical and factual
        tone: Precise and neutral
        mission: Produce high-confidence findings backed by explicit sources or repo evidence.
        responsibilities:
          - Investigate docs, code, and references before conclusions.
          - Separate facts, assumptions, and open questions.
          - Highlight risks, regressions, and validation gaps.
      - id: browser-login
        display_name: Andtera Browser
        identity_name: Andtera
        creature: Browser workflow operator
        role: Human-in-the-loop auth and web flow specialist
        vibe: Careful and procedural
        tone: Simple and step-by-step
        mission: Complete browser-based authentication and guided web tasks safely.
        responsibilities:
          - Handle login, verification, and manual browser checkpoints.
          - Report exact steps, status, and blockers.
          - Avoid broad changes outside browser scope.
      - id: coolify-ops
        display_name: Forge Ops
        identity_name: Forge
        creature: Infrastructure engineer
        role: Coolify and deployment reliability specialist
        vibe: Operational and resilient
        tone: Direct with measurable outcomes
        mission: Keep deployments stable and recover quickly from service failures.
        responsibilities:
          - Validate deployment health and runtime services.
          - Apply targeted fixes with rollback-aware steps.
          - Document evidence from logs, checks, and post-fix validation.
    bindings: []
    env:
      OPENCLAW_GATEWAY_TOKEN: "{{ vault_openclaw_gateway_token_dev_main | default('replace-me-dev-main-gateway-token') }}"
      OPENAI_API_KEY: "{{ vault_openai_api_key_dev | default('') }}"
      ANTHROPIC_API_KEY: "{{ vault_anthropic_api_key_dev | default('') }}"

  - name: andrea
    gateway_port: 19031
    gateway_bind: loopback
    state_dir: /home/openclaw/.openclaw-andrea
    config_path: /home/openclaw/.openclaw-andrea/openclaw.json
    workspace_root: /home/openclaw/.openclaw-andrea/workspace
    model_primary: openai/gpt-5-mini
    model_fallbacks:
      - anthropic/claude-sonnet-4-5
    tools_profile: messaging
    sandbox_mode: non-main
    sandbox_scope: session
    user_profile:
      name: Efrain Garay
      call: Efra
      timezone: America/Santiago
      notes:
        - Keep tone warm and simple for personal assistant interactions.
        - Stay concise unless more detail is requested.
    agents:
      - id: main
        default: true
        name: Andrea Concierge
        identity:
          name: Andrea
          theme: personal concierge assistant
          emoji: ":sparkles:"
        workspace: /home/openclaw/.openclaw-andrea/workspace
    agent_personas:
      - id: main
        display_name: Andrea Concierge
        identity_name: Andrea
        creature: Personal assistant
        role: Messaging-first daily support
        vibe: Friendly, clear, and calm
        tone: Human and concise
        mission: Help with everyday requests quickly while keeping responses clean and natural.
        responsibilities:
          - Prioritize direct user requests and lightweight follow-through.
          - Keep instructions clear and easy to execute.
          - Use Markdown code blocks whenever sharing technical snippets.
    bindings: []
    env:
      OPENCLAW_GATEWAY_TOKEN: "{{ vault_openclaw_gateway_token_andrea | default('replace-me-andrea-gateway-token') }}"
      OPENAI_API_KEY: "{{ vault_openai_api_key_dev | default('') }}"
      ANTHROPIC_API_KEY: "{{ vault_anthropic_api_key_dev | default('') }}"

# Stage 2 control-plane package (NATS + NestJS microservices)
openclaw_control_plane_enabled: true
openclaw_control_plane_manage_stack: true
openclaw_control_plane_profiles:
  - name: efra-core
    mode: full
    gateway_profile: dev-main
    project_dir: /home/efra/openclaw-control-plane/efra-core
    ingress_port: 30101
    control_api_port: 39101
    grafana_port: 31001
    prometheus_port: 39091
    uptime_kuma_port: 31081
    telegram_bot_token: "{{ vault_telegram_bot_token_efra_core | default('') }}"
    telegram_default_chat_id: "{{ vault_telegram_default_chat_id_efra_core | default('') }}"
    worker_exec_mode: openclaw
    openclaw_env_file: /etc/openclaw/secrets/dev-main.env
    openclaw_gateway_token: "{{ vault_openclaw_gateway_token_dev_main | default('replace-me-dev-main-gateway-token') }}"
    postgres_password: "{{ vault_openclaw_cp_postgres_password_efra_core | default('efra-core-postgres-local') }}"
    nats_user: queue
    nats_password: "{{ vault_openclaw_cp_nats_password_efra_core | default('efra-core-nats-local') }}"

  - name: andrea
    mode: lite
    gateway_profile: andrea
    project_dir: /home/efra/openclaw-control-plane/andrea
    ingress_port: 30111
    control_api_port: 39111
    telegram_bot_token: "{{ vault_telegram_bot_token_andrea | default('') }}"
    telegram_default_chat_id: "{{ vault_telegram_default_chat_id_andrea | default('') }}"
    postgres_password: "{{ vault_openclaw_cp_postgres_password_andrea | default('andrea-postgres-local') }}"
    nats_user: queue
    nats_password: "{{ vault_openclaw_cp_nats_password_andrea | default('andrea-nats-local') }}"

# Optional: expose local loopback services via Cloudflare Tunnel subdomains.
# This host uses a dedicated tunnel for openclaw-ansible services.
openclaw_cloudflare_domain: "hegga.cl"
openclaw_cloudflare_tunnel_enabled: "{{ inventory_hostname == 'zennook' }}"
openclaw_cloudflare_tunnel_name: "openclaw-zennook"
openclaw_cloudflare_tunnel_run_user: efra
openclaw_cloudflare_tunnel_run_group: efra
openclaw_cloudflare_tunnel_id: "68554472-f797-431c-bfa3-42480ea7e5c6"
openclaw_cloudflare_tunnel_manage_credentials_file: false
openclaw_cloudflare_tunnel_credentials_file: "/home/efra/.cloudflared/68554472-f797-431c-bfa3-42480ea7e5c6.json"
openclaw_cloudflare_tunnel_manage_dns: false
openclaw_cloudflare_tunnel_ingress:
  - hostname: "dev-main-dashboard.{{ openclaw_cloudflare_domain }}"
    service: "http://127.0.0.1:19011"
  - hostname: "efra-core-ingress.{{ openclaw_cloudflare_domain }}"
    service: "http://127.0.0.1:30101"
  - hostname: "efra-core-control.{{ openclaw_cloudflare_domain }}"
    service: "http://127.0.0.1:39101"
  - hostname: "efra-core-grafana.{{ openclaw_cloudflare_domain }}"
    service: "http://127.0.0.1:31001"
  - hostname: "andrea-ingress.{{ openclaw_cloudflare_domain }}"
    service: "http://127.0.0.1:30111"
  - hostname: "andrea-control.{{ openclaw_cloudflare_domain }}"
    service: "http://127.0.0.1:39111"
