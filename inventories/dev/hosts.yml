---
all:
  vars:
    ansible_user: efra
    ansible_become: true
    ansible_become_method: sudo
  children:
    openclaw_gateway:
      hosts:
        zennook:
          ansible_host: 100.127.119.39
          ansible_connection: local
          ansible_user: efra
        fedora:
          ansible_host: 100.109.82.18
          ansible_user: clawadmin
    openclaw_mobile_nodes:
      vars:
        # Mobile nodes connect to gateway WS and are paired from gateway CLI.
        # They are inventory metadata only (not Ansible SSH targets).
        openclaw_node_transport: gateway_ws
        openclaw_node_role: node
      hosts:
        android_efra:
          openclaw_node_platform: android
          openclaw_node_enabled: true
          openclaw_node_gateway: zennook
          openclaw_node_tailnet_ip: 100.78.147.33
          openclaw_node_magicdns: poco-f8-ultra.tail486c6b.ts.net
