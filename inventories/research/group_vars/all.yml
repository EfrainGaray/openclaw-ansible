---
openclaw_install_mode: development
openclaw_enterprise_enabled: true
openclaw_enterprise_profiles:
  - name: research-main
    gateway_port: 19211
    gateway_bind: loopback
    browser:
      enabled: true
      defaultProfile: openclaw
    state_dir: /home/openclaw/.openclaw-research-main
    config_path: /home/openclaw/.openclaw-research-main/openclaw.json
    workspace_root: /home/openclaw/.openclaw-research-main/workspace
    model_primary: openai/gpt-5.2
    model_fallbacks:
      - anthropic/claude-opus-4-6
      - openai/gpt-5-mini
    tools_profile: coding
    sandbox_mode: all
    sandbox_scope: session
    agents:
      - id: main
        default: true
        workspace: /home/openclaw/.openclaw-research-main/workspace
      - id: experiments
        workspace: /home/openclaw/.openclaw-research-main/workspace-experiments
        tools:
          profile: coding
      - id: browser-login
        workspace: /home/openclaw/.openclaw-research-main/workspace-browser-login
        sandbox:
          mode: "off"
        tools:
          profile: full
          allow:
            - browser
    bindings: []
    env:
      OPENCLAW_GATEWAY_TOKEN: "{{ vault_openclaw_gateway_token_research_main | default('') }}"
      OPENAI_API_KEY: "{{ vault_openai_api_key_research | default('') }}"
      ANTHROPIC_API_KEY: "{{ vault_anthropic_api_key_research | default('') }}"
